services:
  - type: web
    name: muvlog-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.main_production:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: "production"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: muvlog-db
          property: connectionString
    healthCheckPath: /api/health

databases:
  - name: muvlog-db
    plan: free
    databaseName: muvlog
